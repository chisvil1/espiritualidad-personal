<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FL2TJ3JP7J"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || localStorage.getItem('skip_analytics') === 'true') {
        window['ga-disable-G-FL2TJ3JP7J'] = true;
      }
      gtag('config', 'G-FL2TJ3JP7J');
    </script>
    
    <!-- PAYPAL SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=AQelJ3XyRwCbr12uMJj-LwbfZokP4tYMlfclwNHWeCG7GxTiZE5UCg-_GdM4U06ug68Dy1MGPof8uN2Q&currency=USD"></script>
    
    <!-- Librería para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSTELAR | Sesión Sistémica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body { margin: 0; background: #010103; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; }
        .chat-container { height: 100%; display: flex; flex-direction: column; width: 100%; max-width: 900px; margin: 0 auto; padding: 1rem; position: relative; z-index: 10; }
        .message-ai { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; line-height: 1.4; color: rgba(255, 255, 255, 0.9); font-style: italic; max-width: 100%; padding: 2rem 0; text-align: left; }
        @media (min-width: 768px) { .message-ai { font-size: 2.2rem; padding: 3rem 0; } }
        .message-user { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 0.85rem; letter-spacing: 0.05em; color: rgba(255, 255, 255, 0.4); text-align: right; margin-left: auto; max-width: 85%; padding: 0.8rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; overflow-y: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .input-pill { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 100px; padding: 0.4rem 0.8rem 0.4rem 1.5rem; width: 100%; }

        #breathing-guide { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; z-index: 5; display: none; pointer-events: none; }
        #breathing-circle { width: 100%; height: 100%; border: 1px solid rgba(242, 226, 176, 0.1); border-radius: 50%; background: radial-gradient(circle, rgba(242, 226, 176, 0.05) 0%, transparent 70%); }
        #breathing-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.4em; color: rgba(242, 226, 176, 0.4); font-weight: 300; }

        #ancestor-tree { position: fixed; right: 2rem; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 1.5rem; z-index: 5; pointer-events: none; }
        .ancestor-node { width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 2s ease; position: relative; }
        .ancestor-node.active { background: #F2E2B0; box-shadow: 0 0 15px #F2E2B0; border-color: #F2E2B0; transform: scale(1.5); }
        .ancestor-label { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 8px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(242, 226, 176, 0); white-space: nowrap; transition: all 1s ease; }
        .ancestor-node.active .ancestor-label { color: rgba(242, 226, 176, 0.6); }

        #healing-modal, #pay-modal { display: none; position: fixed; inset: 0; background: rgba(1, 1, 3, 0.98); z-index: 100; padding: 2rem; overflow-y: auto; }
        .pay-card { max-width: 500px; margin: 6rem auto; background: #050507; color: #fff; padding: 4rem; border: 1px solid rgba(242, 226, 176, 0.1); border-radius: 2rem; position: relative; box-shadow: 0 0 100px rgba(0,0,0,1); }
        .pay-card::before { content: ''; position: absolute; inset: 0.5rem; border: 1px solid rgba(242, 226, 176, 0.03); border-radius: 1.5rem; pointer-events: none; }

        .healing-letter { max-width: 600px; margin: 4rem auto; background: #fdfaf3; color: #2c2c2c; padding: 5rem; font-family: 'Cormorant Garamond', serif; box-shadow: 0 0 50px rgba(0,0,0,0.5); position: relative; }
        .healing-letter::before { content: ''; position: absolute; inset: 1.5rem; border: 1px solid rgba(0,0,0,0.05); pointer-events: none; }
        .prose p { margin-bottom: 1.2rem; }
        
        .btn-gold { font-family: 'Cinzel', serif; background: #F2E2B0; color: #010103; padding: 1rem 2rem; border-radius: 100px; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; transition: all 0.5s ease; }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(242, 226, 176, 0.3); }
        
        .mic-active { color: #F2E2B0; filter: drop-shadow(0 0 10px #F2E2B0); }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>

    <div id="breathing-guide">
        <div id="breathing-circle"></div>
        <div id="breathing-text">Inhala</div>
    </div>

    <div id="ancestor-tree">
        <div class="ancestor-node" id="node-padre"><span class="ancestor-label">Linaje Paterno</span></div>
        <div class="ancestor-node" id="node-madre"><span class="ancestor-label">Linaje Materno</span></div>
        <div class="ancestor-node" id="node-abuelos"><span class="ancestor-label">Ancestros</span></div>
        <div class="ancestor-node" id="node-hermanos"><span class="ancestor-label">Fraternidad</span></div>
        <div class="ancestor-node" id="node-hijos"><span class="ancestor-label">Descendencia</span></div>
    </div>

    <header class="fixed top-0 left-0 w-full p-6 md:p-10 z-50 flex justify-between items-center pointer-events-none">
        <a href="/" class="pointer-events-auto text-[8px] md:text-[10px] uppercase tracking-[0.4em] text-white/20 hover:text-white flex items-center gap-3"><i data-lucide="arrow-left" class="w-3 h-3"></i> Salir</a>
        <div id="voice-mode-status" class="flex items-center gap-2 opacity-0 transition-opacity duration-1000">
            <div class="w-1 h-1 bg-ancestral rounded-full animate-pulse"></div>
            <span class="text-[7px] md:text-[8px] uppercase tracking-[0.4em] text-ancestral/60">Escuchando...</span>
        </div>
    </header>

    <div class="chat-container">
        <div id="chat-window" class="flex-1 hide-scroll pt-24 pb-32 space-y-12"></div>
        <div class="fixed bottom-6 left-0 w-full px-4 z-50">
            <div class="max-w-2xl mx-auto flex flex-col gap-4">
                <div class="flex justify-between items-center px-6">
                    <button id="clear-btn" class="text-[7px] uppercase tracking-[0.3em] text-white/10 hover:text-ancestral/60 transition-colors">Limpiar Alma</button>
                    <button id="export-btn" class="text-[7px] uppercase tracking-[0.3em] text-white/10 hover:text-ancestral/60 transition-colors">Carta Ancestral</button>
                </div>
                <div class="input-pill flex items-center gap-4">
                    <button id="mic-btn" class="w-10 h-10 flex items-center justify-center text-white/20"><i data-lucide="mic" id="mic-icon" class="w-4 h-4"></i></button>
                    <form id="chat-form" class="flex-1">
                        <input type="text" id="user-input" placeholder="Escribe o habla..." class="w-full bg-transparent py-4 text-base md:text-lg font-light focus:outline-none placeholder:text-white/5" autocomplete="off">
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE PAGO -->
    <div id="pay-modal">
        <div class="pay-card text-center">
            <h2 class="font-cinzel text-ancestral text-xl uppercase tracking-[0.4em] mb-8">Intercambio de Energía</h2>
            <p class="font-garamond italic text-xl mb-12 text-white/60">Para profundizar en tu sanación y recibir tu Carta Ancestral, se requiere un intercambio sagrado.</p>
            <div id="paypal-button-container" class="mb-8"></div>
            <button onclick="document.getElementById('pay-modal').style.display='none'" class="text-[8px] uppercase tracking-widest text-white/20 hover:text-white transition-colors">Cerrar</button>
        </div>
    </div>

    <!-- MODAL DE CARTA -->
    <div id="healing-modal">
        <div id="pdf-area">
            <div class="healing-letter">
                <h2 class="text-center text-2xl uppercase tracking-[0.3em] mb-12 border-b border-black/10 pb-8">Carta de Sanación</h2>
                <div id="healing-content" class="text-xl leading-relaxed italic space-y-6 text-zinc-800"></div>
                <div class="mt-20 pt-8 border-t border-black/5 flex justify-between items-center text-zinc-400">
                    <span class="text-[10px] uppercase tracking-widest">Portal Constelar • 2026</span>
                    <span class="text-[10px] uppercase tracking-widest italic">Todo está en orden</span>
                </div>
            </div>
        </div>
        <div class="max-w-[600px] mx-auto mt-8 flex justify-between items-center px-4">
            <button id="download-pdf" class="btn-gold">Descargar PDF</button>
            <button id="close-modal" class="text-xs uppercase tracking-widest text-white/40 hover:text-white">Cerrar</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const canvas = document.querySelector('#galaxy-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        const count = window.innerWidth < 768 ? 3000 : 8000;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5) * 15;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const stars = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, color: 0x4B2C5E, transparent: true, opacity: 0.3 }));
        scene.add(stars);
        const createOrb = (color, x, y) => {
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.1 }));
            orb.position.set(x, y, 0);
            orb.add(new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.05, side: THREE.BackSide })));
            return orb;
        };
        const orbs = { self: createOrb(0xffffff, 0, -1), father: createOrb(0x4B2C5E, -2, 1), mother: createOrb(0xF2E2B0, 2, 1) };
        Object.values(orbs).forEach(o => scene.add(o));
        function animate() {
            stars.rotation.y += 0.0001;
            const time = Date.now() * 0.001;
            orbs.self.position.y = -1 + Math.sin(time * 0.5) * 0.1;
            orbs.father.position.y = 1 + Math.sin(time * 0.7) * 0.15;
            orbs.mother.position.y = 1 + Math.sin(time * 0.6) * 0.15;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const payModal = document.getElementById('pay-modal');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const voiceStatus = document.getElementById('voice-mode-status');
        
        let isPaid = localStorage.getItem('is_paid') === 'true';
        let msgCount = parseInt(localStorage.getItem('msg_count')) || 0;
        let isVoiceMode = false;

        const intencionUsuario = localStorage.getItem('constelar_intencion');
        let history = JSON.parse(localStorage.getItem('constelar_history')) || [
            { role: "system", content: `Eres una terapeuta sistémica maternal. Tu voz es suave y profunda. 
            El usuario llega hoy con la intención: "${intencionUsuario || 'Sanación general'}".
            Incluye siempre al final de cada respuesta un tag de emoción: [PAZ], [DOLOR], [ORDEN], [AMOR], [LINAJE]. 
            Respuestas breves (2-3 frases). Una pregunta por turno.` }
        ];

        if (history.length > 1) { history.forEach(m => { if (m.role !== 'system') addMsg(m.role, m.content, false); }); } 
        else { addMsg('ai', intencionUsuario ? `Respira. El campo se abre para mirar: "${intencionUsuario}". ¿Qué sientes ahora?` : "Respira. ¿Qué sistema deseas mirar hoy?", true); }

        function startBreathing() {
            const guide = document.getElementById('breathing-guide');
            const circle = document.getElementById('breathing-circle');
            const text = document.getElementById('breathing-text');
            guide.style.display = 'block';
            const tl = gsap.timeline({ repeat: -1 });
            tl.to(circle, { scale: 1.2, duration: 4, ease: "sine.inOut", onStart: () => text.innerText = "Inhala" })
              .to(circle, { scale: 0.8, duration: 4, ease: "sine.inOut", onStart: () => text.innerText = "Exhala" });
            guide._tl = tl;
        }

        function stopBreathing() {
            const guide = document.getElementById('breathing-guide');
            if (guide._tl) guide._tl.kill();
            guide.style.display = 'none';
        }

        function updateAtmosphere(emotion) {
            let color;
            switch(emotion) {
                case 'PAZ': color = 0xF2E2B0; break;
                case 'DOLOR': color = 0x4B2C5E; break;
                case 'ORDEN': color = 0xffffff; break;
                case 'AMOR': color = 0xff5555; break;
                case 'LINAJE': color = 0x2E3A59; break;
                default: color = 0x4B2C5E;
            }
            gsap.to(stars.material.color, { r: new THREE.Color(color).r, g: new THREE.Color(color).g, b: new THREE.Color(color).b, duration: 3 });
        }

        function speak(text) {
            if (!isVoiceMode) return;
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/\[.*?\]/g, '').replace(/[*_#]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            // Buscar voz femenina y fluida (estilo Siri/Alexa)
            utterance.voice = voices.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Lucia') || v.name.includes('Helena'))) || voices[0];
            utterance.rate = 1.1; // Más fluido
            utterance.pitch = 1.0;
            utterance.onstart = () => { if (recognition) recognition.stop(); voiceStatus.style.opacity = '0'; };
            utterance.onend = () => { if (isVoiceMode && recognition) { try { recognition.start(); voiceStatus.style.opacity = '1'; } catch(e){} } };
            window.speechSynthesis.speak(utterance);
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (Speech) {
            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.onresult = (e) => {
                userInput.value = e.results[e.results.length - 1][0].transcript;
                chatForm.dispatchEvent(new Event('submit'));
            };
        }

        micBtn.onclick = () => {
            isVoiceMode = !isVoiceMode;
            if (isVoiceMode) {
                gtag('event', 'uso_microfono', {'estado': 'activado'});
                try { recognition.start(); } catch(e) {}
                micIcon.classList.add('mic-active');
                voiceStatus.style.opacity = '1';
            } else {
                gtag('event', 'uso_microfono', {'estado': 'desactivado'});
                recognition.stop();
                window.speechSynthesis.cancel();
                micIcon.classList.remove('mic-active');
                voiceStatus.style.opacity = '0';
            }
        };

        function addMsg(role, content, animate = true) {
            let emotion = 'ORDEN';
            const match = content.match(/\[(PAZ|DOLOR|ORDEN|AMOR|LINAJE)\]/);
            if (match) { emotion = match[1]; content = content.replace(/\[.*?\]/g, '').trim(); if (role !== 'user') updateAtmosphere(emotion); }
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} ${animate ? 'opacity-0' : 'opacity-100'}`;
            const bubble = document.createElement('div');
            bubble.className = role === 'user' ? 'message-user' : 'message-ai prose';
            bubble.innerHTML = (role !== 'user') ? marked.parse(content) : content;
            div.appendChild(bubble);
            chatWindow.appendChild(div);
            if (animate) gsap.to(div, { opacity: 1, y: -5, duration: 2 });
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = userInput.value.trim(); if (!val) return;
            if (!isPaid && msgCount >= 10) { payModal.style.display = 'block'; return; }
            userInput.value = ''; addMsg('user', val, true); reactToContent(val);
            msgCount++; localStorage.setItem('msg_count', msgCount);
            history.push({ role: "user", content: val });
            localStorage.setItem('constelar_history', JSON.stringify(history));
            startBreathing();
            try {
                const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: history }) });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                stopBreathing(); addMsg('ai', reply, true); reactToContent(reply);
                history.push({ role: "assistant", content: reply });
                localStorage.setItem('constelar_history', JSON.stringify(history));
                speak(reply);
            } catch (err) { stopBreathing(); addMsg('ai', "...el campo calla temporalmente.", true); }
        };

        function reactToContent(text) {
            const lowText = text.toLowerCase();
            if (lowText.includes('padre') || lowText.includes('papá')) { pulseOrb(orbs.father, 0x4B2C5E); document.getElementById('node-padre').classList.add('active'); }
            if (lowText.includes('madre') || lowText.includes('mamá')) { pulseOrb(orbs.mother, 0xF2E2B0); document.getElementById('node-madre').classList.add('active'); }
            if (lowText.includes('abuelo') || lowText.includes('abuela')) { document.getElementById('node-abuelos').classList.add('active'); }
            if (lowText.includes('hermano') || lowText.includes('hermana')) { document.getElementById('node-hermanos').classList.add('active'); }
            if (lowText.includes('hijo') || lowText.includes('hija')) { document.getElementById('node-hijos').classList.add('active'); }
            if (lowText.includes('tú') || lowText.includes('yo') || lowText.includes('mí')) { pulseOrb(orbs.self, 0xffffff); }
        }

        function pulseOrb(orb, color) {
            gsap.to(orb.material, { opacity: 0.6, duration: 0.5, yoyo: true, repeat: 1 });
            gsap.to(orb.scale, { x: 1.5, y: 1.5, z: 1.5, duration: 0.5, yoyo: true, repeat: 1 });
        }

        paypal.Buttons({
            style: { layout: 'vertical', color: 'gold', shape: 'pill', label: 'paypal' },
            createOrder: (data, actions) => { return actions.order.create({ purchase_units: [{ amount: { value: '9.99' } }] }); },
            onApprove: (data, actions) => {
                return actions.order.capture().then(details => {
                    alert('Gracias por tu intercambio, ' + details.payer.name.given_name + '. El campo se expande para ti.');
                    isPaid = true; localStorage.setItem('is_paid', 'true');
                    payModal.style.display = 'none';
                });
            }
        }).render('#paypal-button-container');

        const exportBtn = document.getElementById('export-btn');
        const healingModal = document.getElementById('healing-modal');
        const healingContent = document.getElementById('healing-content');
        
        exportBtn.onclick = () => {
            if (!isPaid) { payModal.style.display = 'block'; return; }
            const sessionContent = history.filter(m => m.role === 'assistant' || m.role === 'ai').slice(-5)
                .map(m => `<p>"${m.content.replace(/\[.*?\]/g, '').replace(/<br>/g, '')}"</p>`).join('');
            healingContent.innerHTML = `<p class="mb-8 opacity-40 italic text-zinc-500">Para el alma que busca su lugar...</p>${sessionContent}<p class="mt-12 opacity-40 italic text-zinc-500">Todo está en orden ahora. Respira.</p>`;
            healingModal.style.display = 'block';
        };

        document.getElementById('download-pdf').onclick = () => {
            const element = document.getElementById('pdf-area');
            const opt = { margin: 1, filename: 'Carta_Sanacion_Constelar.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        };

        document.getElementById('close-modal').onclick = () => { healingModal.style.display = 'none'; };
        document.getElementById('clear-btn').onclick = () => { if(confirm("¿Deseas liberar esta sesión?")) { localStorage.removeItem('constelar_history'); localStorage.removeItem('msg_count'); location.reload(); } };
    </script>
</body>
</html>
