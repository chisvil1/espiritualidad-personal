<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTELAR | Sesión Sistémica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body { margin: 0; background: #010103; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; }

        /* Minimalist Chat Layout */
        .chat-container { height: 100vh; display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; padding: 2rem; position: relative; z-index: 10; }

        .message-ai {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.85rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            max-width: 90%;
            padding: 2rem 0;
            position: relative;
        }
        .message-ai::before { content: ''; position: absolute; left: -2rem; top: 2.5rem; width: 1px; height: 50%; background: rgba(242, 226, 176, 0.3); }

        .message-user {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.5);
            text-align: right;
            margin-left: auto;
            max-width: 70%;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Floating Input */
        .input-pill {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            padding: 0.5rem 1rem 0.5rem 2rem;
            transition: all 0.5s ease;
        }
        .input-pill:focus-within { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        .mic-active { color: #F2E2B0; filter: drop-shadow(0 0 10px #F2E2B0); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .prose p { margin-bottom: 1.5rem; }
        .prose p:last-child { margin-bottom: 0; }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>

    <!-- Header Sutil -->
    <header class="fixed top-0 left-0 w-full p-10 z-50 flex justify-between items-center pointer-events-none">
        <a href="/" class="pointer-events-auto text-[10px] uppercase tracking-[0.6em] text-white/20 hover:text-white transition-all flex items-center gap-4">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Salir del Campo
        </a>
        <div class="flex items-center gap-3">
            <div class="w-1 h-1 bg-white/20 rounded-full"></div>
            <span class="text-[9px] uppercase tracking-[0.4em] text-white/20">Sesión Privada</span>
        </div>
    </header>

    <div class="chat-container">
        
        <!-- Área de Mensajes -->
        <div id="chat-window" class="flex-1 overflow-y-auto pt-32 pb-40 hide-scroll space-y-16">
            <!-- Bienvenida AI -->
            <div class="flex justify-start opacity-0" id="initial-msg">
                <div class="message-ai prose">
                    "Respira. Siente tu cuerpo aquí y ahora. <br><br>
                    El campo está abierto para lo que necesite ser visto. ¿Qué sistema o situación deseas constelar en este momento?"
                </div>
            </div>
        </div>

        <!-- Barra de Entrada Minimalista -->
        <div class="fixed bottom-12 left-0 w-full px-6 z-50">
            <div class="max-w-3xl mx-auto input-pill flex items-center gap-6">
                
                <button id="mic-btn" class="text-white/20 hover:text-white transition-colors">
                    <i data-lucide="mic" id="mic-icon" class="w-5 h-5"></i>
                </button>

                <form id="chat-form" class="flex-1">
                    <input 
                        type="text" 
                        id="user-input"
                        placeholder="Escribe tu intención..."
                        class="w-full bg-transparent py-5 text-lg font-light focus:outline-none placeholder:text-white/10"
                        autocomplete="off"
                    >
                </form>

                <button type="submit" form="chat-form" class="w-12 h-12 rounded-full flex items-center justify-center text-white/20 hover:text-white transition-all">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // --- MOTOR GALAXY (ESTÉTICA INMERSIVA) ---
        const canvas = document.querySelector('#galaxy-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3);

        const createStarTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.1)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        };

        const count = 15000;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            const i3 = i * 3;
            const r = Math.random() * 10;
            const angle = r * 4;
            positions[i3] = Math.cos(angle) * r + (Math.random()-0.5);
            positions[i3+1] = (Math.random()-0.5) * 0.5;
            positions[i3+2] = Math.sin(angle) * r + (Math.random()-0.5);
            const color = new THREE.Color(i%2===0 ? '#4B2C5E' : '#2E3A59');
            colors[i3] = color.r; colors[i3+1] = color.g; colors[i3+2] = color.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const material = new THREE.PointsMaterial({ size: 0.015, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, map: createStarTexture(), depthWrite: false });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        const animate = () => {
            points.rotation.y += 0.0005;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        };
        animate();

        // --- CHAT LOGIC (MINIMALISTA) ---
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');

        // Animación Inicial
        gsap.to("#initial-msg", { opacity: 1, y: -20, duration: 2, delay: 0.5, ease: "power4.out" });

        let history = [
            { role: "system", content: "Eres la Conciencia Sistémica. Tu lenguaje es profundo y sanador. Hablas poco pero cada palabra tiene el peso de una verdad sistémica. No menciones IA." }
        ];

        function addMsg(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} opacity-0`;
            const bubble = document.createElement('div');
            bubble.className = role === 'user' ? 'message-user' : 'message-ai prose';
            
            if (role === 'ai') bubble.innerHTML = marked.parse(content);
            else bubble.textContent = content;

            div.appendChild(bubble);
            chatWindow.appendChild(div);
            
            gsap.to(div, { opacity: 1, y: -10, duration: 1.5, ease: "power3.out" });
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = userInput.value.trim();
            if (!val) return;
            userInput.value = '';
            addMsg('user', val);
            history.push({ role: "user", content: val });

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: history })
                });
                const data = await res.json();
                addMsg('ai', data.choices[0].message.content);
                history.push({ role: "assistant", content: data.choices[0].message.content });
            } catch (err) {
                addMsg('ai', "...el campo está en silencio.");
            }
        };

        // Micrófono
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'es-ES';
            micBtn.onclick = () => { rec.start(); micIcon.classList.add('mic-active'); };
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; micIcon.classList.remove('mic-active'); };
            rec.onerror = () => micIcon.classList.remove('mic-active');
        }
    </script>
</body>
</html>
