<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSTELAR | Sesión Sistémica</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body { margin: 0; background: #010103; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; }

        .chat-container { height: 100%; display: flex; flex-direction: column; width: 100%; max-width: 900px; margin: 0 auto; padding: 1rem; position: relative; z-index: 10; }

        .message-ai {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            max-width: 100%;
            padding: 2rem 0;
            text-align: left;
        }
        @media (min-width: 768px) { .message-ai { font-size: 2.2rem; padding: 3rem 0; } }

        .message-user {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            margin-left: auto;
            max-width: 85%;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; overflow-y: auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .input-pill {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            padding: 0.4rem 0.8rem 0.4rem 1.5rem;
            width: 100%;
        }

        .mic-active { color: #F2E2B0; filter: drop-shadow(0 0 10px #F2E2B0); }
        .mic-listening { animation: pulse-glow 3s infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        .prose p { margin-bottom: 1.2rem; }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>

    <header class="fixed top-0 left-0 w-full p-6 md:p-10 z-50 flex justify-between items-center pointer-events-none">
        <a href="/" class="pointer-events-auto text-[8px] md:text-[10px] uppercase tracking-[0.4em] text-white/20 hover:text-white flex items-center gap-3">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Salir
        </a>
        <div id="voice-mode-status" class="flex items-center gap-2 opacity-0 transition-opacity duration-1000">
            <div class="w-1 h-1 bg-ancestral rounded-full animate-pulse"></div>
            <span class="text-[7px] md:text-[8px] uppercase tracking-[0.4em] text-ancestral/60">Escuchando...</span>
        </div>
    </header>

    <div class="chat-container">
        <div id="chat-window" class="flex-1 hide-scroll pt-24 pb-32 space-y-12">
            <div class="flex justify-start opacity-0" id="initial-msg">
                <div class="message-ai prose">
                    "Respira. Siente tu presencia. <br><br>
                    ¿Qué sistema deseas mirar hoy?"
                </div>
            </div>
        </div>

        <div class="fixed bottom-6 left-0 w-full px-4 z-50">
            <div class="max-w-2xl mx-auto input-pill flex items-center gap-4">
                <button id="mic-btn" class="w-10 h-10 flex items-center justify-center text-white/20">
                    <i data-lucide="mic" id="mic-icon" class="w-4 h-4"></i>
                </button>
                <form id="chat-form" class="flex-1">
                    <input type="text" id="user-input" placeholder="Escribe o habla..." class="w-full bg-transparent py-4 text-base md:text-lg font-light focus:outline-none placeholder:text-white/5" autocomplete="off">
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- GALAXY (Mobile Optimized) ---
        const canvas = document.querySelector('#galaxy-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;
        const count = window.innerWidth < 768 ? 5000 : 10000;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5) * 10;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.01, color: 0x4B2C5E, transparent: true, opacity: 0.4 })));
        function animate() { scene.rotation.y += 0.0002; renderer.render(scene, camera); requestAnimationFrame(animate); }
        animate();

        // --- CORE ---
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const voiceStatus = document.getElementById('voice-mode-status');

        let isVoiceMode = false;
        let history = [{ role: "system", content: "Eres una terapeuta sistémica maternal. Respuestas breves (2-3 frases). Una pregunta por turno. Voz maternal." }];

        gsap.to("#initial-msg", { opacity: 1, y: -10, duration: 3 });

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (Speech) {
            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.onresult = (e) => {
                userInput.value = e.results[e.results.length - 1][0].transcript;
                chatForm.dispatchEvent(new Event('submit'));
            };
        }

        micBtn.onclick = () => {
            isVoiceMode = !isVoiceMode;
            if (isVoiceMode) {
                recognition.start();
                micIcon.classList.add('mic-active', 'mic-listening');
                voiceStatus.style.opacity = '1';
            } else {
                recognition.stop();
                micIcon.classList.remove('mic-active', 'mic-listening');
                voiceStatus.style.opacity = '0';
            }
        };

        function speak(text) {
            if (isVoiceMode) recognition.stop();
            voiceStatus.style.opacity = '0';
            const cleanText = text.replace(/[*_#]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            utterance.voice = voices.find(v => v.lang.includes('es') && (v.name.includes('Google') || v.name.includes('Helena'))) || voices[0];
            utterance.rate = 0.75;
            utterance.onend = () => { if (isVoiceMode) { setTimeout(() => { recognition.start(); voiceStatus.style.opacity = '1'; }, 600); } };
            window.speechSynthesis.speak(utterance);
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = userInput.value.trim();
            if (!val) return;
            userInput.value = '';
            addMsg('user', val);
            history.push({ role: "user", content: val });
            try {
                const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: history }) });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMsg('ai', reply);
                history.push({ role: "assistant", content: reply });
                speak(reply);
            } catch (err) { addMsg('ai', "...el campo calla."); }
        };

        function addMsg(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} opacity-0`;
            const bubble = document.createElement('div');
            bubble.className = role === 'user' ? 'message-user' : 'message-ai prose';
            bubble.innerHTML = role === 'ai' ? marked.parse(content) : content;
            div.appendChild(bubble);
            chatWindow.appendChild(div);
            gsap.to(div, { opacity: 1, y: -5, duration: 2 });
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
