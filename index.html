<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espiritualidad Personal | Guía de Sanación Sistémica</title>
    
    <!-- Google Fonts: Elegancia y Modernidad -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        soul: {
                            bg: '#FCFAFA',
                            accent: '#78350F',
                            card: 'rgba(255, 255, 255, 0.7)',
                            user: '#2C1E11'
                        }
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #FFF7ED 0%, #FDF4FF 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(120, 53, 15, 0.1);
        }

        .message-ai {
            background: white;
            border: 1px solid rgba(120, 53, 15, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 24px 24px 24px 4px;
        }

        .message-user {
            background: #2C1E11;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 24px 24px 4px 24px;
        }

        .chat-scroll {
            height: calc(100vh - 280px);
            scrollbar-width: thin;
            scrollbar-color: rgba(120, 53, 15, 0.1) transparent;
        }

        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(120, 53, 15, 0.1); border-radius: 10px; }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-msg { animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Estilo para el Markdown dentro de los mensajes */
        .prose p { margin-bottom: 0.75rem; line-height: 1.7; }
        .prose p:last-child { margin-bottom: 0; }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background-color: #78350F;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="font-sans text-soul-user selection:bg-amber-100">

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12 flex flex-col h-screen">
        
        <!-- Header Minimalista -->
        <header class="text-center mb-8 animate-msg" style="animation-delay: 0.1s;">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-white shadow-xl mb-4">
                <i data-lucide="sparkles" class="text-amber-800 w-8 h-8"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-serif font-bold text-amber-950 tracking-tight mb-2">
                Espiritualidad <span class="italic text-amber-800/80">Personal</span>
            </h1>
            <p class="text-sm font-medium text-amber-900/40 uppercase tracking-[0.4em]">
                Sanación Sistémica • IA Consciente
            </p>
        </header>

        <!-- Contenedor Principal -->
        <div class="glass-panel rounded-[40px] flex-1 flex flex-col overflow-hidden relative">
            
            <!-- Barra de Estado -->
            <div class="px-8 py-4 border-b border-white/40 flex justify-between items-center bg-white/20">
                <div class="flex items-center space-x-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-semibold text-amber-900/60 tracking-wider uppercase">Sesión Privada Activa</span>
                </div>
                <button onclick="location.reload()" class="hover:rotate-180 transition-transform duration-500 text-amber-900/40">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>

            <!-- Ventana de Mensajes -->
            <div class="flex-1 overflow-y-auto px-6 py-8 chat-scroll space-y-8" id="chat-window">
                <!-- Bienvenida AI -->
                <div class="flex justify-start opacity-0 animate-msg" style="animation-delay: 0.5s;">
                    <div class="message-ai p-6 max-w-[85%]">
                        <p class="font-serif italic text-lg text-amber-950 leading-relaxed">
                            "Te doy la bienvenida a este espacio sagrado. Aquí, honramos tus raíces y buscamos el orden que trae paz. ¿Qué movimiento desea hacer tu alma el día de hoy?"
                        </p>
                    </div>
                </div>
            </div>

            <!-- Area de Entrada -->
            <div class="p-6 bg-white/30 border-t border-white/50">
                <form id="chat-form" class="relative max-w-2xl mx-auto">
                    <input 
                        type="text" 
                        id="user-input"
                        placeholder="Escribe aquí tus sentimientos o inquietudes..."
                        class="w-full bg-white/80 border border-amber-900/10 rounded-[32px] px-8 py-5 pr-20 text-lg focus:outline-none focus:ring-4 focus:ring-amber-900/5 focus:bg-white transition-all shadow-sm placeholder:text-amber-950/20"
                        autocomplete="off"
                    >
                    <button 
                        type="submit"
                        class="absolute right-2 top-1/2 -translate-y-1/2 bg-amber-900 text-white w-14 h-14 rounded-full hover:scale-105 active:scale-95 transition-all shadow-lg flex items-center justify-center group"
                    >
                        <i data-lucide="arrow-up" class="w-6 h-6 group-hover:-translate-y-1 transition-transform"></i>
                    </button>
                </form>
                <p class="text-center text-[9px] text-amber-900/30 mt-4 uppercase tracking-widest font-medium">
                    Guiado por Groq Llama 3.3 • Un viaje hacia el interior
                </p>
            </div>
        </div>
    </div>

    <script>
        // Inicializar Iconos
        lucide.createIcons();

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        let chatHistory = [
            { role: "system", content: "Eres un terapeuta de Constelaciones Familiares altamente profesional, empático y profundo. Tu tono es cálido pero clínico en su precisión sistémica. Usas un lenguaje que invita a la sanación: 'Mirar con amor', 'Asentir a lo que es', 'Honrar a los ancestros'. Evitas respuestas genéricas. Tu objetivo es que el usuario identifique dinámicas ocultas en su sistema familiar. Mantén las respuestas elegantes y profundas." }
        ];

        function addMessage(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-msg`;
            
            const bubble = document.createElement('div');
            bubble.className = `p-6 max-w-[85%] ${role === 'user' ? 'message-user' : 'message-ai prose font-serif italic text-lg text-amber-950'}`;
            
            if (role === 'ai') {
                bubble.innerHTML = marked.parse(content);
            } else {
                bubble.textContent = content;
            }

            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            
            // Scroll suave
            setTimeout(() => {
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex justify-start animate-msg';
            div.innerHTML = `
                <div class="message-ai px-6 py-4 flex items-center space-x-2">
                    <div class="typing-indicator flex space-x-1">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="text-xs font-medium text-amber-900/40 uppercase tracking-widest">IA reflexionando</span>
                </div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function hideTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addMessage('user', text);
            chatHistory.push({ role: "user", content: text });

            showTyping();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: chatHistory })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                hideTyping();
                addMessage('ai', aiResponse);
                chatHistory.push({ role: "assistant", content: aiResponse });

            } catch (error) {
                console.error("Error:", error);
                hideTyping();
                addMessage('ai', "Hubo una interrupción en la conexión. Por favor, respira profundo e inténtalo de nuevo.");
            }
        };
    </script>
</body>
</html>
